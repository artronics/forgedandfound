name: Deploy setup
description: AWS OIDC credentials + pinned terraform, ready to run raw terraform commands.

inputs:
  aws_account:
    description: nonprod | prod
    required: true

runs:
  using: composite
  steps:
    - uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ inputs.aws_account == 'prod' && 'arn:aws:iam::028607041427:role/GithubDeployRole' || 'arn:aws:iam::939103584423:role/GithubDeployRole' }}
        aws-region: eu-west-2

    - uses: hashicorp/setup-terraform@v4
      with:
        # Keep in sync with .terraform-version and the required_version pins.
        terraform_version: 1.15.5
        # The wrapper corrupts $(terraform output -raw ...) captures.
        terraform_wrapper: false

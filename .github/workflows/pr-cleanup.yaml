# Destroy the ephemeral pr-<number> deployment when its PR closes (merged or
# not), remove the Vercel alias, and delete the now-empty state file.
name: PR cleanup

on:
  pull_request:
    branches: [preview]
    types: [closed]

concurrency:
  group: pr-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    env:
      TF_VAR_aws_account: nonprod
      DEPLOYMENT_NAME: pr-${{ github.event.number }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          aws_account: nonprod

      - name: Init
        working-directory: terraform/platform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=artronics-ff-${TF_VAR_aws_account}-platform-tf-state" \
            -backend-config="key=deployments/${DEPLOYMENT_NAME}.tfstate"

      - name: Destroy deployment
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0, pinned: third-party
        with:
          command: |
            cd terraform/platform
            var_file=""; [ -f "env/${DEPLOYMENT_NAME}.tfvars" ] && var_file="-var-file=env/${DEPLOYMENT_NAME}.tfvars"
            terraform destroy -input=false -auto-approve -var="deployment=${DEPLOYMENT_NAME}" $var_file
          max_attempts: 2
          timeout_minutes: 15
          retry_wait_seconds: 30

      - name: Remove Vercel alias
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TELEMETRY_DISABLED: 1
        run: |
          npm install -g vercel
          vercel alias rm "${DEPLOYMENT_NAME}.nonprod.forgedandfound.co.uk" --yes --token="$VERCEL_TOKEN" || true

      # Only after a clean destroy — a failed destroy's state is the record of
      # what leaked and must survive for diagnosis. The state-list guard
      # protects against the destroy step lying about success.
      - name: Delete empty state file
        if: success()
        run: |
          remaining=$(cd terraform/platform && terraform state list | wc -l)
          if [ "$remaining" -ne 0 ]; then
            echo "::error::state still tracks $remaining resource(s) — keeping state file"
            exit 1
          fi
          aws s3 rm "s3://artronics-ff-nonprod-platform-tf-state/deployments/${DEPLOYMENT_NAME}.tfstate"

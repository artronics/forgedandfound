# Product detail + variant data.
#
# VariantSelector_Product and Variant_ProductVariant are the two fragments that
# earn their keep: they are shared across product, collection, search, wishlist
# and cart documents, and useVariantSelector/CartLine rely on their masked types.
#
# VariantMeta_ProductVariant carries the model bindings (MODEL.md): each variant
# references a jewellery_finish (material/purity/colour composite) and a
# jewellery_size metaobject. These are the source of truth for what a variant
# *is* — option strings are only a display fallback for unresolved finishes.

fragment VariantMeta_ProductVariant on ProductVariant {
    finish: metafield(namespace: "custom", key: "finish") {
        reference {
            ... on Metaobject {
                handle
                label: field(key: "label") {
                    value
                }
                purity: field(key: "purity") {
                    value
                }
                material: field(key: "material") {
                    reference {
                        ... on Metaobject {
                            handle
                            label: field(key: "label") {
                                value
                            }
                        }
                    }
                }
                colour: field(key: "colour") {
                    reference {
                        ... on Metaobject {
                            handle
                            label: field(key: "label") {
                                value
                            }
                            image: field(key: "image") {
                                reference {
                                    ... on MediaImage {
                                        image {
                                            url
                                            altText
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }
    }
    size: metafield(namespace: "custom", key: "size") {
        reference {
            ... on Metaobject {
                handle
                label: field(key: "label") {
                    value
                }
                sortOrder: field(key: "sort_order") {
                    value
                }
            }
        }
    }
}

fragment VariantSelector_Product on Product {
    id
    title
    handle
    featuredImage {
        id
        altText
        url
    }
    variants(first: $variantFirst) {
        edges {
            node {
                id
                product {
                    id
                    title
                    category {
                        name
                    }
                }
                availableForSale
                currentlyNotInStock
                image {
                    thumbhash
                    id
                    altText
                    url
                    width
                    height
                }
                price {
                    amount
                    currencyCode
                }
                compareAtPrice {
                    amount
                    currencyCode
                }
                selectedOptions {
                    name
                    value
                }
                ...VariantMeta_ProductVariant
            }
        }
    }
}

fragment Variant_ProductVariant on ProductVariant {
    id
    product {
        title
        id
    }
    availableForSale
    currentlyNotInStock
    image {
        thumbhash
        id
        altText
        url
        width
        height
        thumbnail: url(transform: {
            maxWidth: 400
            maxHeight: 400
            scale: 2
            crop: CENTER
            preferredContentType: WEBP
        })
    }
    price {
        amount
        currencyCode
    }
    compareAtPrice {
        amount
        currencyCode
    }
    selectedOptions {
        name
        value
    }
    ...VariantMeta_ProductVariant
}

query GetProductByHandle($id: ID, $handle: String, $variantFirst: Int = 32, $imageFirst: Int = 12) {
    product(id: $id, handle: $handle) {
        id
        handle
        title
        vendor
        category {
            name
        }
        priceRange {
            minVariantPrice {
                amount
                currencyCode
            }
        }
        images(first: $imageFirst) {
            edges {
                node {
                    id
                    altText
                    thumbhash
                    url
                    width
                    height
                }
            }
        }
        ...VariantSelector_Product
    }
}

# Shop-level content: hero, navigation menu and legal policies.
# These are fetched in server components (see lib/shopify/server.ts).

query GetShop($namespace: String, $heroKey: String!) {
    shop {
        id
        name
        hero: metafield(namespace: $namespace, key: $heroKey) {
            reference {
                ... on MediaImage {
                    image {
                        url
                        altText
                        width
                        height
                    }
                }
            }
        }
    }
}

query GetShopPolicies {
    shop {
        id
        privacyPolicy {
            title
            body
        }
        termsOfService {
            title
            body
        }
        refundPolicy {
            title
            body
        }
        shippingPolicy {
            title
            body
        }
    }
}

# The nav is entirely the seeded menu resource (spec/menu.yaml): three levels of
# title + url. What an item *is* (collection link, filter link, heading) is
# already encoded in its url — no resources or metafields to walk.
query GetMenu {
    menu(handle: "main-menu") {
        items {
            title
            url
            items {
                title
                url
                items {
                    title
                    url
                }
            }
        }
    }
}

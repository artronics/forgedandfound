fragment ProductGallery_Product on Product {
    id
    title
    featuredImage {
        id
        altText
        url
    }
    images(first: $imageFirst) {
        edges {
            node {
                id
                altText
                thumbhash
                url
                width
                height
            }
        }
    }
    variants(first: $variantFirst) {
        edges {
            node {
                ... on ProductVariant {
                    id
                    title
                    image {
                        thumbhash
                        id
                        altText
                        url
                    }
                }
            }
        }
    }
}

fragment VariantSelector_Product on Product {
    id
    title
    handle
    featuredImage {
        id
        altText
        url
    }
    variants(first: $variantFirst) {
        edges {
            node {
                id
                product {
                    id
                    title
                    category {
                        name
                    }
                }
                availableForSale
                currentlyNotInStock
                image {
                    thumbhash
                    id
                    altText
                    url
                    width
                    height
                }
                price {
                    amount
                    currencyCode
                }
                compareAtPrice {
                    amount
                    currencyCode
                }
                selectedOptions {
                    name
                    value
                }
            }
        }
    }
}

fragment Variant_ProductVariant on ProductVariant {
    id
    product {
        title
        id
    }
    availableForSale
    currentlyNotInStock
    image {
        thumbhash
        id
        altText
        url
        width
        height
        thumbnail: url(transform: {
            maxWidth: 400
            maxHeight: 400
            scale: 2
            crop: CENTER
            preferredContentType: WEBP
        })
    }
    price {
        amount
        currencyCode
    }
    compareAtPrice {
        amount
        currencyCode
    }
    selectedOptions {
        name
        value
    }
}

query GetProductByHandle($id: ID, $handle: String, $variantFirst: Int = 32, $imageFirst: Int = 12) {
    product(id: $id, handle: $handle) {
        id
        handle
        title
        category {
            name
        }
        vendor
        priceRange {
            minVariantPrice {
                amount
                currencyCode
            }
        }
        ...VariantSelector_Product
        ...ProductGallery_Product
    }
}

query GetProductMetafields($productId: ID, $identifiers: [HasMetafieldsIdentifier!]!) {
    product(id: $productId) {
        id
        metafields(identifiers: $identifiers) {
            references(first: 8) {
                nodes {
                    ... on Metaobject {
                        id
                        type
                        fields {
                            key
                            value
                        }
                    }
                }
            }
        }
    }
}

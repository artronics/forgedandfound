mutation CartCreate($input: CartInput!) {
    cartCreate(input: $input) {
        cart {
            id
            totalQuantity
            ...CartSummary_Cart
        }
        userErrors {
            field
            message
        }
    }
}
mutation CartLineAdd($cartId: ID!, $line: CartLineInput!, $first: Int = 100) {
    cartLinesAdd(cartId: $cartId, lines: [$line]) {
        cart {
            id
            totalQuantity
            ...CartSummary_Cart
            ...CartLines_Cart
            lines(first: $first) {
                nodes {
                    id
                    quantity
                    merchandise {
                        ... on ProductVariant {
                            id
                        }
                    }
                }
            }
        }
        userErrors {
            field
            message
        }
        warnings {
            code
            message
            target
        }
    }
}

mutation CartLineUpdate($cartId: ID!, $line: CartLineUpdateInput!, $first: Int = 100) {
    cartLinesUpdate(cartId: $cartId, lines: [$line]) {

query PredictiveSearch($query: String!, $limit: Int = 5) {
    predictiveSearch(query: $query, limit: $limit, limitScope: EACH, types: [PRODUCT, QUERY]) {
        products {
            ...SearchResult_Product
        }
        queries {
            text
            styledText
        }
    }
}

query SearchProducts(
    $query: String!
    $first: Int!
    $after: String
    $filters: [ProductFilter!]
    $sortKey: SearchSortKeys = RELEVANCE
    $reverse: Boolean = false
    $variantFirst: Int = 32
) {
    search(
        query: $query
        first: $first
        after: $after
        productFilters: $filters
        sortKey: $sortKey
        reverse: $reverse
        types: [PRODUCT]
    ) {
        productFilters {
            id
            label
            type
            values {
                id
                label
                count
                input
            }
        }
        edges {
            cursor
            node {
                ... on Product {
                    id
                    ...VariantSelector_Product @nonreactive
                }
            }
        }
        pageInfo {
            hasNextPage
            endCursor
        }
        totalCount
    }
}

query GetCollectionByHandle(
    $handle: String!
    $first: Int!
    $after: String
    $filters: [ProductFilter!]
    $sortKey: ProductCollectionSortKeys!
    $reverse: Boolean = false
    $variantFirst: Int = 32
) {
    collection(handle: $handle) {
        id
        handle
        title
        description
        image {
            url
            altText
        }
        products(
            first: $first
            after: $after
            filters: $filters
            sortKey: $sortKey
            reverse: $reverse
        ) {
            ...Filters_Product
            edges {
                cursor
                node {
                    ... on Product {
                        id
                        ...VariantSelector_Product @nonreactive
                    }
                }
            }
            pageInfo {
                hasNextPage
                endCursor
            }
        }
    }
}


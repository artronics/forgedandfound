query GetMenu {
    menu(handle: "main-menu") {
        main: items {
            title
            url
            resource {
                ... on Collection {
                    id
                    handle
                    description
                    image {
                        url
                        altText
                        width
                        height
                    }
                }
            }
            filters: items {
                title
                items {
                    url
                    title
                    resource {
                        ... on Collection {
                            id
                            metafield(key: "styles", namespace: "custom") {
                                value
                                references(first: 32) {
                                    edges {
                                        node {
                                            ... on Metaobject {
                                                id
                                                handle
                                                type
                                                fields {
                                                    key
                                                    references(first: 4) {
                                                        edges {
                                                            node {
                                                                ... on MediaImage {
                                                                    image {
                                                                        url
                                                                        altText
                                                                        width
                                                                        height
                                                                    }
                                                                }
                                                            }
                                                        }
                                                    }
                                                }
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }
    }
}


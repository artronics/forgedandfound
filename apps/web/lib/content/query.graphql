query GetPrivacyPolicy {
    shop {
        id
        privacyPolicy {
            title
            body
        }
    }
}
query GetTermsOfService {
    shop {
        id
        termsOfService {
            title
            body
        }
    }
}
query GetRefundPolicy {
    shop {
        id
        refundPolicy {
            title
            body
        }
    }
}
query GetShippingPolicy {
    shop {
        id
        shippingPolicy {
            title
            body
        }
    }
}

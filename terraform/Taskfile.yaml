version: '3'

# Two root modules:
#   infra    — per AWS account (TF_VAR_aws_account=nonprod|prod)
#   platform — per deployment  (TF_VAR_aws_account + DEPLOYMENT=<name>)
#
# AWS credentials are ambient: AWS_PROFILE locally (.env.terraform), an OIDC
# role in CI. The providers pin allowed_account_ids, so applying with the wrong
# account's credentials fails before touching anything.
#
# The platform deployment is taken from DEPLOYMENT=<name> on the CLI, or from
# the DEPLOYMENT_NAME environment variable (used by CI).

tasks:
  apply-all:
    desc: Apply all infra and platform modules
    cmds:
      - task: infra:init
      - task: infra:apply
      - task: platform:init
      - task: platform:apply


  infra:init:
    desc: Init infra root (per account)
    dir: infra
    requires: { vars: [TF_VAR_aws_account] }
    env:
      TF_DATA_DIR: '.terraform/{{.TF_VAR_aws_account}}'
    cmds:
      - >
        terraform init -reconfigure
        -backend-config="bucket=artronics-ff-${TF_VAR_aws_account}-infra-tf-state"
        -backend-config="key=infra.tfstate"

  infra:plan:
    desc: Plan infra
    dir: infra
    requires: { vars: [TF_VAR_aws_account] }
    env:
      TF_DATA_DIR: '.terraform/{{.TF_VAR_aws_account}}'
    cmds:
      - terraform plan -var-file="env/${TF_VAR_aws_account}.tfvars"

  infra:apply:
    desc: Apply infra
    dir: infra
    requires: { vars: [TF_VAR_aws_account] }
    env:
      TF_DATA_DIR: '.terraform/{{.TF_VAR_aws_account}}'
    cmds:
      - terraform apply -var-file="env/${TF_VAR_aws_account}.tfvars" -auto-approve

  infra:destroy:
    desc: Destroy infra (nonprod only, FORCE=1 required)
    dir: infra
    requires: { vars: [TF_VAR_aws_account] }
    env:
      TF_DATA_DIR: '.terraform/{{.TF_VAR_aws_account}}'
    preconditions:
      - sh: '[ "$TF_VAR_aws_account" != "prod" ]'
        msg: Refusing to destroy prod infra.
      - sh: '[ "{{.FORCE}}" = "1" ]'
        msg: Destroying infra takes the shared user pool and DNS zones with it. Re-run with FORCE=1 if you mean it.
    cmds:
      - terraform destroy -var-file="env/${TF_VAR_aws_account}.tfvars" -auto-approve

  platform:init:
    desc: 'Init platform root for a deployment. Usage: task tf:platform:init DEPLOYMENT=foo'
    dir: platform
    requires: { vars: [TF_VAR_aws_account] }
    preconditions:
      - sh: '[ -n "{{.DEPLOYMENT}}" ]'
        msg: Set DEPLOYMENT=<name> on the CLI or the DEPLOYMENT_NAME env var.
    env:
      TF_DATA_DIR: '.terraform/{{.TF_VAR_aws_account}}-{{.DEPLOYMENT}}'
    cmds:
      - >
        terraform init -reconfigure
        -backend-config="bucket=artronics-ff-${TF_VAR_aws_account}-platform-tf-state"
        -backend-config="key=deployments/{{.DEPLOYMENT}}.tfstate"
    vars:
      DEPLOYMENT: '{{.DEPLOYMENT | default .DEPLOYMENT_NAME}}'

  platform:plan:
    desc: Plan a platform deployment
    dir: platform
    requires: { vars: [TF_VAR_aws_account] }
    preconditions:
      - sh: '[ -n "{{.DEPLOYMENT}}" ]'
        msg: Set DEPLOYMENT=<name> on the CLI or the DEPLOYMENT_NAME env var.
    env:
      TF_DATA_DIR: '.terraform/{{.TF_VAR_aws_account}}-{{.DEPLOYMENT}}'
    cmds:
      - terraform plan -var="deployment={{.DEPLOYMENT}}" {{.VAR_FILE_FLAG}}
    vars:
      DEPLOYMENT: '{{.DEPLOYMENT | default .DEPLOYMENT_NAME}}'
      VAR_FILE_FLAG:
        sh: '[ -f "env/{{.DEPLOYMENT}}.tfvars" ] && echo -var-file="env/{{.DEPLOYMENT}}.tfvars" || true'

  platform:apply:
    desc: Apply a platform deployment
    dir: platform
    requires: { vars: [TF_VAR_aws_account] }
    preconditions:
      - sh: '[ -n "{{.DEPLOYMENT}}" ]'
        msg: Set DEPLOYMENT=<name> on the CLI or the DEPLOYMENT_NAME env var.
    env:
      TF_DATA_DIR: '.terraform/{{.TF_VAR_aws_account}}-{{.DEPLOYMENT}}'
    cmds:
      - terraform apply -var="deployment={{.DEPLOYMENT}}" {{.VAR_FILE_FLAG}} -auto-approve
    vars:
      DEPLOYMENT: '{{.DEPLOYMENT | default .DEPLOYMENT_NAME}}'
      VAR_FILE_FLAG:
        sh: '[ -f "env/{{.DEPLOYMENT}}.tfvars" ] && echo -var-file="env/{{.DEPLOYMENT}}.tfvars" || true'

  platform:destroy:
    desc: Destroy a platform deployment (never prod, never preview)
    dir: platform
    requires: { vars: [TF_VAR_aws_account] }
    env:
      TF_DATA_DIR: '.terraform/{{.TF_VAR_aws_account}}-{{.DEPLOYMENT}}'
    preconditions:
      - sh: '[ -n "{{.DEPLOYMENT}}" ]'
        msg: Set DEPLOYMENT=<name> on the CLI or the DEPLOYMENT_NAME env var.
      - sh: '[ "$TF_VAR_aws_account" != "prod" ]'
        msg: Refusing to destroy prod platform deployments.
      - sh: '[ "{{.DEPLOYMENT}}" != "preview" ]'
        msg: preview is a protected deployment (permanent test env) and cannot be destroyed.
    cmds:
      - terraform destroy -var="deployment={{.DEPLOYMENT}}" {{.VAR_FILE_FLAG}} -auto-approve
    vars:
      DEPLOYMENT: '{{.DEPLOYMENT | default .DEPLOYMENT_NAME}}'
      VAR_FILE_FLAG:
        sh: '[ -f "env/{{.DEPLOYMENT}}.tfvars" ] && echo -var-file="env/{{.DEPLOYMENT}}.tfvars" || true'

version: 3

dotenv:
  - .env.development
  - .env.local
  - .env.scripts
  - .env.terraform

includes:
  web:
    taskfile: ./apps/web/Taskfile.yaml
    dir: ./apps/web
  vercel:web:
    taskfile: ./apps/web/Taskfile.vercel.yaml
    dir: .
  tf:
    taskfile: ./terraform/Taskfile.yaml
    dir: ./terraform
  services:
    taskfile: ./services/Taskfile.yaml
    dir: ./services
  scripts:
    taskfile: ./scripts/Taskfile.yaml
    dir: ./scripts

tasks:
  build:
    desc: Build all projects
    cmds:
      - turbo build
  wt:symlinks:
    desc: Symlink shared .env files from the main worktree
    cmds:
      - |
        ROOT="$(git worktree list --porcelain | awk '/^worktree / {print $2; exit}')"

        for file in \
          .env \
          .env.local \
          .env.development \
          .env.terraform \
          .env.scripts
        do
          if [ -f "$ROOT/$file" ]; then
            ln -snf "$ROOT/$file" "$file"
            echo "Linked $file"
          else
            echo "Skipping $file (not found)"
          fi
        done
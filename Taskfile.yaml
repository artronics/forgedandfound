version: 3

dotenv:
  - .env.development
  - .env.local
  - .env.infra
  - .env.platform
  - .env.scripts

includes:
  web:
    taskfile: ./apps/web/Taskfile.yaml
    dir: ./apps/web
  vercel:web:

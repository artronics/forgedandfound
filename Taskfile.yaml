version: 3

dotenv:
  - .env.development
  - .env.local
  - .env.scripts
  - .env.terraform

includes:
  web:
    taskfile: ./apps/web/Taskfile.yaml
    dir: ./apps/web
  vercel:web:
    taskfile: ./apps/web/Taskfile.vercel.yaml
    dir: .
  tf:
    taskfile: ./terraform/Taskfile.yaml
    dir: ./terraform
  services:
    taskfile: ./services/Taskfile.yaml
    dir: ./services
  scripts:
    taskfile: ./scripts/Taskfile.yaml
    dir: ./scripts

tasks:
  build:
    desc: Build all projects
    cmds:
      - turbo build

  deploy:web:dev:
    desc: 'Deploy platform DEPLOYMENT_NAME, then the web app to Vercel wired to it, aliased onto development.forgedandfound.co.uk'
    vars:
      DEPLOYMENT: '{{.DEPLOYMENT | default .DEPLOYMENT_NAME}}'
    preconditions:
      - sh: '[ -n "{{.DEPLOYMENT}}" ]'
        msg: Set DEPLOYMENT=<name> on the CLI or the DEPLOYMENT_NAME env var.
      - sh: '[ "$TF_VAR_aws_account" = "nonprod" ]'
        msg: 'deploy:web:dev only targets nonprod (development is a nonprod-reserved namespace).'
    cmds:
      - task: tf:platform:init
        vars: { DEPLOYMENT: '{{.DEPLOYMENT}}' }
      - task: tf:platform:apply
        vars: { DEPLOYMENT: '{{.DEPLOYMENT}}' }
      # Vercel builds remotely from the whole-monorepo upload (Root Directory =
      # apps/web); no local build step. We only read the platform outputs to
      # (a) write the local-dev env file and (b) pass build-env to Vercel.
      - |
        set -euo pipefail
        cd terraform/platform
        export TF_DATA_DIR=".terraform/${TF_VAR_aws_account}-{{.DEPLOYMENT}}"
        tfout() { terraform output -raw "$1"; }
        CLIENT_ID="$(tfout cognito_client_id)"
        CLIENT_SECRET="$(tfout cognito_client_secret)"
        ISSUER="https://cognito-idp.eu-west-2.amazonaws.com/$(tfout cognito_user_pool_id)"
        API_URL="$(tfout api_url)"
        cd ../..

        # Platform-derived env for local `next dev`. Loaded only by `next dev`
        # (NODE_ENV=development), layered over apps/web/.env.development which
        # holds the non-platform values (Shopify, AUTH_SECRET, ...).
        cat > apps/web/.env.development.local <<EOF
        # Generated by \`task deploy:web:dev\` — platform deployment '{{.DEPLOYMENT}}'. Do not edit or commit.
        NEXT_PUBLIC_COGNITO_CLIENT_ID=$CLIENT_ID
        COGNITO_CLIENT_SECRET=$CLIENT_SECRET
        COGNITO_ISSUER_URL=$ISSUER
        USER_API_URL=$API_URL
        NEXT_PUBLIC_APP_URL=http://localhost:3000
        EOF
        echo "wrote apps/web/.env.development.local (deployment: {{.DEPLOYMENT}})"

        # Deploy from the repo root so the whole workspace uploads; --build-env
        # supplies the platform values (non-platform ones come from the Vercel
        # project's env vars).
        url=$(vercel deploy --yes \
          --build-env NEXT_PUBLIC_COGNITO_CLIENT_ID="$CLIENT_ID" \
          --build-env COGNITO_CLIENT_SECRET="$CLIENT_SECRET" \
          --build-env COGNITO_ISSUER_URL="$ISSUER" \
          --build-env USER_API_URL="$API_URL" \
          --build-env NEXT_PUBLIC_APP_URL="https://development.forgedandfound.co.uk")
        vercel alias set "$url" development.forgedandfound.co.uk
  wt:symlinks:
    desc: Symlink shared .env files from the main worktree
    cmds:
      - ./scripts/wt-symlinks.sh